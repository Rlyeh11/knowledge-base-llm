version: '3.8'

services:
  knowledge-base:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-base-system
    ports:
      - "5000:5000"
    volumes:
      # 挂载数据目录
      - ./assets:/app/assets
      - ./logs:/app/work/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 可选：添加 PostgreSQL 数据库支持
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: knowledge-base-db
  #   environment:
  #     POSTGRES_DB: knowledge_base
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
